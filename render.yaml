services:
  # FastAPI 웹 API (프론트엔드가 호출하는 /calculate, /ilun, /analyze 등)
  # 같은 Dockerfile을 재사용하되 실행 명령만 uvicorn으로 override 한다.
  - type: web
    name: saju-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # Render 대시보드에서 직접 입력

  # 텔레그램 봇 (기존 유지 — 변경 없음)
  - type: worker
    name: saju-telegram-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # Render 대시보드에서 직접 입력
      - key: GOOGLE_API_KEY
        sync: false  # Render 대시보드에서 직접 입력
